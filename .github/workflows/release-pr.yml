name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - prerelease
      preid:
        description: Pre-release identifier (e.g. alpha, beta, rc) — only used with prerelease
        required: false
        type: string

jobs:
  bump-version:
    uses: mafintosh/actions/.github/workflows/release-pr.yml
    with:
      bump: ${{ inputs.bump }}
      preid: ${{ inputs.preid }}
    permissions:
      contents: write
      pull-requests: write
