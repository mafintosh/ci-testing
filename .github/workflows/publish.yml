name: Publish
on:
  pull_request:
    types: [closed]
    branches:
      - main
jobs:
  approve-release:
    if: "${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'Release: ') }}"
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "Approved"
  publish:
    needs: approve-release
    if: "${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'Release: ') }}"
    permissions:
      contents: write
      id-token: write
    uses: mafintosh/actions/.github/workflows/auto-publish.yml@main
    secrets: inherit
